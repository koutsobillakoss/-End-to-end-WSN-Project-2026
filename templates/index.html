<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>WSN Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #00d4ff; }
        .charts { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .chart-box { background: #16213e; border-radius: 10px; padding: 20px; width: 45%; min-width: 300px; }
        .history { background: #16213e; border-radius: 10px; padding: 20px; margin-top: 20px; }
        input[type="datetime-local"] { background: #0f3460; color: #eee; border: 1px solid #00d4ff; padding: 5px; border-radius: 5px; }
        button { background: #00d4ff; color: #000; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #0f3460; padding: 8px; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #333; }
        .status { text-align: center; color: #00d4ff; margin: 10px; }
    </style>
</head>
<body>
    <h1> WSN Real-Time Dashboard</h1>
    <p class="status" id="status">Αναμονή δεδομένων...</p>

    <div class="charts">
        <div class="chart-box">
            <h3>Θερμοκρασία (°C)</h3>
            <canvas id="tempChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>Υγρασία (%)</h3>
            <canvas id="humChart"></canvas>
        </div>
    </div>

    <div class="history">
        <h3> Ιστορικά Δεδομένα</h3>
        <label>Από: <input type="datetime-local" id="start"></label>
        <label>Έως: <input type="datetime-local" id="end"></label>
        <button onclick="loadHistory()">Αναζήτηση</button>
        <table>
            <thead><tr><th>Timestamp</th><th>Node ID</th><th>Sample</th><th>Temp (°C)</th><th>Humidity (%)</th></tr></thead>
            <tbody id="historyTable"></tbody>
        </table>
    </div>

    <script>
        const tempChart = new Chart(document.getElementById("tempChart"), {
            type: "line",
            data: { labels: [], datasets: [{ label: "Temp °C", data: [], borderColor: "#ff6384", tension: 0.3, fill: false }] },
            options: { scales: { y: { ticks: { color: "#eee" } }, x: { ticks: { color: "#eee", maxTicksLimit: 8 } } }, plugins: { legend: { labels: { color: "#eee" } } } }
        });

        const humChart = new Chart(document.getElementById("humChart"), {
            type: "line",
            data: { labels: [], datasets: [{ label: "Humidity %", data: [], borderColor: "#36a2eb", tension: 0.3, fill: false }] },
            options: { scales: { y: { ticks: { color: "#eee" } }, x: { ticks: { color: "#eee", maxTicksLimit: 8 } } }, plugins: { legend: { labels: { color: "#eee" } } } }
        });

        function updateCharts() {
            fetch("/api/latest")
                .then(r => r.json())
                .then(data => {
                    data.reverse();
                    const labels = data.map(d => d.timestamp.slice(11, 19));
                    const temps = data.map(d => d.temperature_c);
                    const hums = data.map(d => d.humidity_pct);

                    tempChart.data.labels = labels;
                    tempChart.data.datasets[0].data = temps;
                    tempChart.update();

                    humChart.data.labels = labels;
                    humChart.data.datasets[0].data = hums;
                    humChart.update();

                    document.getElementById("status").textContent = 
                        `Τελευταία ανανέωση: ${new Date().toLocaleTimeString()} | Τελευταία μέτρηση: Temp ${temps[temps.length-1]}°C, Hum ${hums[hums.length-1]}%`;
                });
        }

        function loadHistory() {
            const start = document.getElementById("start").value;
            const end = document.getElementById("end").value;
            fetch(`/api/history?start=${start}&end=${end}`)
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById("historyTable");
                    tbody.innerHTML = data.map(d => `
                        <tr>
                            <td>${d.timestamp}</td>
                            <td>${d.node_id}</td>
                            <td>${d.sample_num}</td>
                            <td>${d.temperature_c}</td>
                            <td>${d.humidity_pct}</td>
                        </tr>`).join("");
                });
        }

        updateCharts();
        setInterval(updateCharts, 20000);
    </script>
</body>
</html>
